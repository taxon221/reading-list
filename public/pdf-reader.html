<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PDF Reader</title>
        <style>
            :root {
                color-scheme: light;
            }

            body {
                margin: 0;
                font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI,
                    Roboto, Helvetica, Arial, sans-serif;
                background: #f5f6f8;
                color: #111827;
            }

            #status {
                position: sticky;
                top: 0;
                z-index: 3;
                padding: 0.5rem 0.75rem;
                font-size: 0.8125rem;
                background: #ffffff;
                border-bottom: 1px solid #e5e7eb;
            }

            #pdf-container {
                padding: 0.75rem;
            }

            .pdf-page {
                position: relative;
                width: fit-content;
                margin: 0 auto 0.9rem;
                background: #fff;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
            }

            .pdf-canvas {
                display: block;
            }

            .textLayer {
                position: absolute;
                inset: 0;
                overflow: hidden;
                line-height: 1;
                text-size-adjust: none;
            }

            .textLayer span,
            .textLayer br {
                position: absolute;
                white-space: pre;
                color: transparent;
                transform-origin: 0% 0%;
                cursor: text;
            }

            .textLayer ::selection {
                background: rgba(59, 130, 246, 0.28);
            }
        </style>
    </head>
    <body>
        <div id="status">Loading PDF...</div>
        <div id="pdf-container"></div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <script src="/static/pdf-reader.js"></script>
    </body>
</html>
