<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Personal reading list manager" />
        <meta name="theme-color" content="#111111" />
        <title>Reading List</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2'><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/></svg>"
        />
        <link rel="stylesheet" href="/static/styles.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Reading List</h1>
                <button
                    type="button"
                    class="theme-toggle"
                    id="theme-toggle"
                    title="Toggle dark mode"
                >
                    <svg
                        class="icon-sun"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line
                            x1="18.36"
                            y1="18.36"
                            x2="19.78"
                            y2="19.78"
                        ></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg
                        class="icon-moon"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                        ></path>
                    </svg>
                </button>
            </header>

            <section class="add-form">
                <form id="add-item-form">
                    <div class="form-row">
                        <input
                            type="url"
                            id="url"
                            placeholder="Paste a URL..."
                            required
                            autocomplete="off"
                        />
                        <button type="submit" id="submit-btn">Add</button>
                    </div>
                    <div class="form-row form-details">
                        <input
                            type="text"
                            id="title"
                            placeholder="Title"
                            class="title-input"
                        />
                        <select id="type-select">
                            <option value="article">Article</option>
                            <option value="video">Video</option>
                            <option value="pdf">PDF</option>
                            <option value="podcast">Podcast</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="tags-input" id="tags-input">
                            <input
                                type="text"
                                id="tag-input"
                                placeholder="Add tags (press Enter)"
                                autocomplete="off"
                            />
                        </div>
                    </div>
                </form>
            </section>

            <section class="filters">
                <div class="filter-dropdown" id="type-dropdown">
                    <button
                        type="button"
                        class="filter-btn"
                        id="type-filter-btn"
                    >
                        <span class="filter-label">Type</span>
                        <span class="filter-value" id="type-filter-value"
                            >All</span
                        >
                        <span class="filter-arrow">▾</span>
                    </button>
                    <div class="dropdown-menu" id="type-menu">
                        <div class="dropdown-search">
                            <input
                                type="text"
                                placeholder="Search..."
                                id="type-search"
                                autocomplete="off"
                            />
                        </div>
                        <div class="dropdown-options" id="type-options">
                            <label class="dropdown-option" data-value="article">
                                <input type="checkbox" value="article" />
                                Article
                            </label>
                            <label class="dropdown-option" data-value="video">
                                <input type="checkbox" value="video" />
                                Video
                            </label>
                            <label class="dropdown-option" data-value="pdf">
                                <input type="checkbox" value="pdf" />
                                PDF
                            </label>
                            <label class="dropdown-option" data-value="podcast">
                                <input type="checkbox" value="podcast" />
                                Podcast
                            </label>
                        </div>
                        <div class="dropdown-actions">
                            <button
                                type="button"
                                class="dropdown-clear"
                                id="type-clear"
                            >
                                Clear
                            </button>
                        </div>
                    </div>
                </div>

                <div class="filter-dropdown" id="tag-dropdown">
                    <button
                        type="button"
                        class="filter-btn"
                        id="tag-filter-btn"
                    >
                        <span class="filter-label">Tags</span>
                        <span class="filter-value" id="tag-filter-value"
                            >All</span
                        >
                        <span class="filter-arrow">▾</span>
                    </button>
                    <div class="dropdown-menu" id="tag-menu">
                        <div class="dropdown-search">
                            <input
                                type="text"
                                placeholder="Search tags..."
                                id="tag-search"
                                autocomplete="off"
                            />
                        </div>
                        <div class="dropdown-options" id="tag-options"></div>
                        <div class="dropdown-actions">
                            <button
                                type="button"
                                class="dropdown-clear"
                                id="tag-clear"
                            >
                                Clear
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="items-list" id="items-list"></section>
        </div>

        <div class="modal-overlay" id="edit-modal" style="display: none">
            <div class="modal">
                <div class="modal-header">
                    <h2>Edit Item</h2>
                    <button type="button" class="modal-close" id="modal-close">
                        ×
                    </button>
                </div>
                <form id="edit-form">
                    <input type="hidden" id="edit-id" />
                    <div class="form-group">
                        <label for="edit-url">URL</label>
                        <input type="url" id="edit-url" required />
                    </div>
                    <div class="form-group">
                        <label for="edit-title">Title</label>
                        <input type="text" id="edit-title" />
                    </div>
                    <div class="form-group">
                        <label for="edit-type">Type</label>
                        <select id="edit-type">
                            <option value="article">Article</option>
                            <option value="video">Video</option>
                            <option value="pdf">PDF</option>
                            <option value="podcast">Podcast</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tags</label>
                        <div class="tags-input" id="edit-tags-input">
                            <input
                                type="text"
                                id="edit-tag-input"
                                placeholder="Add tags (press Enter)"
                                autocomplete="off"
                            />
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button
                            type="button"
                            class="btn-secondary"
                            id="modal-cancel"
                        >
                            Cancel
                        </button>
                        <button type="submit" class="btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>

        <script src="/static/app.js"></script>
    </body>
</html>
